<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HEALTHY">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3182F6">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>HEALTHY — 트레이닝 로그</title>
</head>
<body>
<style>
  :root{
    --bg:#F2F4F6; --card:#FFFFFF; --card2:#F7F8FA;
    --blue:#3182F6; --blue-d:#2870E0; --blue-t:#EAF2FF;
    --ink:#191F28; --sub:#4E5968; --muted:#8B95A1; --line:#E5E8EB;
    --up:#12B886; --down:#F04452; --yellow:#FFF6D6; --yellow-b:#F2C94C;
    --c-chest:#FF6B6B; --c-back:#4C6EF5; --c-shoulder:#FF922B; --c-legs:#3182F6;
    --c-arms:#9775FA; --c-abs:#20C997; --c-calf:#F06595;
    --r:18px; --sh:0 1px 3px rgba(0,20,60,.06),0 1px 2px rgba(0,20,60,.04);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Noto Sans KR",system-ui,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased; letter-spacing:-.01em;
  }
  .app{max-width:480px; margin:0 auto; padding:0 16px 92px; min-height:100vh;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  button{font-family:inherit; letter-spacing:-.01em;}

  header.top{position:sticky; top:0; z-index:20; background:var(--bg); padding:18px 0 8px;}
  .htitle{font-size:22px; font-weight:800; letter-spacing:-.03em;}
  .hsub{color:var(--muted); font-size:13px; margin-top:1px;}

  /* program progress card */
  .prog{background:linear-gradient(135deg,#3182F6,#4C6EF5); color:#fff; border-radius:20px; padding:18px; margin:8px 0 14px; box-shadow:0 6px 18px rgba(49,130,246,.28);}
  .prog .pname{font-size:17px; font-weight:800;}
  .prog .pweek{font-size:12.5px; opacity:.85; margin-top:2px;}
  .prog .bar{height:7px; background:rgba(255,255,255,.28); border-radius:5px; margin-top:13px; overflow:hidden;}
  .prog .bar i{display:block; height:100%; background:#fff; border-radius:5px;}
  .prog .pmeta{display:flex; justify-content:space-between; font-size:12px; margin-top:8px; opacity:.92;}

  .weeks{display:flex; gap:8px; overflow-x:auto; padding:2px 0 6px; scrollbar-width:none;}
  .weeks::-webkit-scrollbar{display:none;}
  .wtab{flex:0 0 auto; border:0; background:none; color:var(--muted); font-size:14px; font-weight:700; padding:6px 4px; position:relative;}
  .wtab.on{color:var(--ink);}
  .wtab.on:after{content:""; position:absolute; left:4px; right:4px; bottom:-1px; height:2.5px; background:var(--ink); border-radius:2px;}

  .days{display:flex; gap:9px; overflow-x:auto; padding:8px 0 6px; scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .dchip{flex:0 0 auto; width:62px; border:0; background:var(--card); border-radius:16px; padding:11px 0; box-shadow:var(--sh); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;}
  .dchip .ic{width:34px; height:34px; border-radius:11px; background:var(--card2); display:flex; align-items:center; justify-content:center;}
  .dchip .ic svg{width:19px; height:19px; stroke:var(--muted); fill:none; stroke-width:2;}
  .dchip .dl{font-size:12px; font-weight:700; color:var(--sub);}
  .dchip.on{background:var(--blue);}
  .dchip.on .dl{color:#fff;} .dchip.on .ic{background:rgba(255,255,255,.2);} .dchip.on .ic svg{stroke:#fff;}
  .dchip.done .ic{background:#E4F8F0;} .dchip.done .ic svg{stroke:var(--up);}
  .dchip.done.on .ic{background:rgba(255,255,255,.2);} .dchip.done.on .ic svg{stroke:#fff;}

  .dayhead{margin:14px 2px 2px;}
  .dayhead h2{margin:0; font-size:19px; font-weight:800; letter-spacing:-.02em;}
  .dayhead .focus{color:var(--sub); font-size:13.5px; margin-top:2px;}

  .cardio{background:var(--card); border-radius:14px; padding:12px 14px; margin:12px 0; box-shadow:var(--sh); color:var(--sub); font-size:13px; display:flex; gap:9px; align-items:flex-start;}
  .cardio .ci{flex:0 0 auto; width:22px; height:22px; color:var(--blue);}
  .cardio b{color:var(--ink);}

  .card{background:var(--card); border-radius:var(--r); padding:15px; margin:12px 0; box-shadow:var(--sh);}
  .exhead{display:flex; align-items:center; gap:11px;}
  .bp{flex:0 0 auto; width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:800;}
  .exmeta{flex:1; min-width:0;}
  .exname{font-size:16px; font-weight:800; letter-spacing:-.02em; line-height:1.25;}
  .exname .ss{font-size:10px; font-weight:800; color:var(--blue); background:var(--blue-t); border-radius:5px; padding:1px 5px; margin-right:5px; vertical-align:1.5px;}
  .exsub{color:var(--muted); font-size:12.5px; margin-top:2px;}
  .exsub .last{color:var(--sub); font-weight:600;}
  .badge{flex:0 0 auto; text-align:right;}
  .badge .wow{font-size:12px; font-weight:800; padding:4px 8px; border-radius:9px;}
  .wow.up{color:var(--up); background:#E4F8F0;} .wow.down{color:var(--down); background:#FDECEE;} .wow.flat{color:var(--muted); background:var(--card2);}

  .recos{display:flex; gap:7px; margin:13px 0 6px;}
  .reco{flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:13px; padding:8px 4px; text-align:center; cursor:pointer;}
  .reco.mid{border-color:var(--blue); background:var(--blue-t);}
  .reco .rl{font-size:11px; color:var(--muted); font-weight:700;}
  .reco.mid .rl{color:var(--blue);}
  .reco .rv{font-size:15px; font-weight:800; margin-top:2px;} .reco .rv small{font-size:11px; color:var(--muted); font-weight:700;}
  .recohint{font-size:11.5px; color:var(--muted); margin:2px 2px 10px;}

  .setrow{display:flex; align-items:center; gap:8px; padding:7px 0; border-top:1px solid var(--line);}
  .setrow:first-of-type{border-top:0;}
  .snum{flex:0 0 auto; width:22px; height:22px; border-radius:50%; background:var(--card2); color:var(--muted); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center;}
  .setrow.done .snum{background:var(--up); color:#fff;}
  .stp{display:flex; align-items:center; background:var(--card2); border-radius:10px; overflow:hidden;}
  .stp button{width:30px; height:38px; border:0; background:transparent; color:var(--sub); font-size:18px; font-weight:600; cursor:pointer;}
  .stp button:active{background:var(--blue-t);}
  .stp input{width:44px; border:0; background:transparent; text-align:center; font-size:15px; font-weight:800; color:var(--ink); padding:0; -moz-appearance:textfield; font-variant-numeric:tabular-nums;}
  .stp input::-webkit-outer-spin-button,.stp input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .unit{font-size:11px; color:var(--muted); font-weight:700; margin-left:-3px;}
  .chk{flex:0 0 auto; margin-left:auto; width:30px; height:30px; border-radius:50%; border:2px solid var(--line); background:var(--card); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;}
  .chk svg{width:16px; height:16px; stroke:var(--muted); fill:none; stroke-width:2.6;}
  .setrow.done .chk{background:var(--up); border-color:var(--up);} .setrow.done .chk svg{stroke:#fff;}

  .exfoot{display:flex; align-items:center; justify-content:space-between; margin-top:10px;}
  .memoBtn{background:var(--card2); border:0; border-radius:9px; color:var(--sub); font-size:12px; font-weight:700; padding:7px 11px; cursor:pointer;}
  .e1tag{font-size:12px; color:var(--muted); font-weight:600;} .e1tag b{color:var(--ink); font-weight:800;}
  .memoBox{margin-top:10px; display:none;}
  .memoBox.open{display:block;}
  .memoBox textarea{width:100%; height:56px; border:1.5px solid var(--line); border-radius:11px; background:var(--card2); padding:10px; font-family:inherit; font-size:13px; color:var(--ink); resize:none;}
  .pinned{background:var(--yellow); border-radius:12px; padding:10px 12px; margin-top:10px; font-size:12.5px; color:#8a6d1a; display:flex; gap:8px;}
  .pinned .pin{flex:0 0 auto;}

  .cta{margin:20px 0 6px;}
  .cta button{width:100%; border:0; background:var(--blue); color:#fff; font-size:16px; font-weight:800; border-radius:15px; padding:16px; box-shadow:0 6px 16px rgba(49,130,246,.32); cursor:pointer;}
  .cta button:active{background:var(--blue-d);}
  .cta button.done{background:var(--up); box-shadow:0 6px 16px rgba(18,184,134,.3);}

  .rest-card{background:var(--card); border-radius:var(--r); padding:28px 18px; text-align:center; box-shadow:var(--sh); margin:14px 0;}
  .rest-card .em{width:56px; height:56px; margin:0 auto 12px; border-radius:18px; background:var(--blue-t); display:flex; align-items:center; justify-content:center;}
  .rest-card .em svg{width:28px; height:28px; stroke:var(--blue); fill:none; stroke-width:2;}
  .rest-card h3{margin:0 0 6px; font-size:18px;} .rest-card p{margin:0; color:var(--sub); font-size:13.5px;}

  /* stats */
  .stat-card{background:var(--card); border-radius:var(--r); padding:17px; margin:12px 0; box-shadow:var(--sh);}
  .stat-card .cap{color:var(--muted); font-size:13px; font-weight:700;}
  .stat-card .big{font-size:30px; font-weight:800; letter-spacing:-.03em; margin-top:3px;} .stat-card .big small{font-size:16px; color:var(--muted); font-weight:800;}
  .wowline{font-size:13px; font-weight:700; margin-top:5px;}
  .chart{display:flex; align-items:flex-end; gap:8px; height:110px; margin:16px 4px 4px;}
  .chart .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
  .chart .stack{width:60%; max-width:26px; border-radius:6px 6px 3px 3px; display:flex; flex-direction:column-reverse; overflow:hidden; min-height:3px;}
  .chart .seg{width:100%;}
  .chart .lab{font-size:11px; color:var(--muted); font-weight:700;}
  .chart .lab.today{color:var(--blue);}
  .bpbars{margin-top:6px;}
  .bpbar{display:flex; align-items:center; gap:10px; padding:7px 0;}
  .bpbar .nm{width:34px; font-size:12.5px; font-weight:700; color:var(--sub);}
  .bpbar .track{flex:1; height:9px; background:var(--card2); border-radius:6px; overflow:hidden;}
  .bpbar .fill{height:100%; border-radius:6px;}
  .bpbar .vv{font-size:12px; font-weight:800; color:var(--ink); width:64px; text-align:right;}
  .spark{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 0; border-top:1px solid var(--line);}
  .spark:first-of-type{border-top:0;}
  .spark .sn{font-size:13.5px; font-weight:700;} .spark .ssub{font-size:11.5px; color:var(--muted); margin-top:1px;}
  .spark svg{flex:0 0 auto;}
  .spark .grow{font-size:13px; font-weight:800; text-align:right;}
  .empty{text-align:center; color:var(--muted); font-size:13.5px; padding:30px 10px;}

  /* program list */
  .p-day{margin:18px 2px 4px; font-size:16px; font-weight:800; display:flex; align-items:center; gap:8px;}
  .p-day .dot{width:8px; height:8px; border-radius:50%;}
  .p-ex{background:var(--card); border-radius:14px; padding:12px 14px; margin:8px 0; box-shadow:var(--sh); display:flex; gap:11px; align-items:flex-start;}
  .p-ex .info{flex:1; min-width:0;}
  .p-ex .n{font-weight:800; font-size:14.5px;} .p-ex .n .ss{font-size:10px; color:var(--blue); background:var(--blue-t); border-radius:5px; padding:1px 5px; margin-right:5px;}
  .p-ex .m{color:var(--muted); font-size:12px; margin-top:4px; line-height:1.5;}
  .p-ex .m b{color:var(--sub); font-weight:700;}

  /* stretch */
  .s-day{margin:22px 2px 6px; font-size:17px; font-weight:800; letter-spacing:-.02em;}
  .s-lab{font-size:13px; font-weight:800; margin:14px 2px 9px; display:flex; align-items:center; gap:7px;}
  .s-lab .d{width:7px; height:7px; border-radius:50%;}
  .s-lab .cnt{margin-left:auto; font-size:11px; color:var(--muted); font-weight:700;}
  .poses{display:flex; gap:12px; overflow-x:auto; padding:2px 2px 10px; margin:0 -2px; scrollbar-width:none; scroll-snap-type:x mandatory;}
  .poses::-webkit-scrollbar{display:none;}
  .pose{flex:0 0 auto; width:162px; background:var(--card); border-radius:18px; box-shadow:var(--sh); overflow:hidden; scroll-snap-align:start;}
  .pose .fig{display:block; width:100%; height:152px;}
  .pose .pbody{padding:11px 13px 13px;}
  .pose .pn{font-size:14.5px; font-weight:800; line-height:1.25; letter-spacing:-.02em; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .pose .key{font-size:10px; font-weight:800; color:#fff; background:var(--blue); border-radius:6px; padding:2px 6px; letter-spacing:0;}
  .pose .key.post{background:var(--up);}
  .pose .pd{font-size:12px; color:var(--muted); margin-top:5px;}
  .s-pt{background:var(--yellow); border-radius:12px; padding:11px 13px; font-size:12.5px; color:#8a6d1a; margin-top:12px; line-height:1.5;}

  /* more tab */
  .m-card{background:var(--card); border-radius:var(--r); padding:17px; margin:12px 0; box-shadow:var(--sh);}
  .m-card h3{margin:0 0 3px; font-size:16px;} .m-card .sb{color:var(--muted); font-size:12px; margin-bottom:13px;}
  .frow{display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-top:1px solid var(--line);}
  .frow:first-of-type{border-top:0;}
  .frow .fl{font-size:14px; font-weight:600; color:var(--sub);}
  .fin{display:flex; align-items:center; gap:4px;}
  .fin input{width:66px; border:0; background:var(--card2); border-radius:9px; text-align:right; font-size:16px; font-weight:800; color:var(--ink); padding:9px 10px; font-variant-numeric:tabular-nums;}
  .fin .u{font-size:12px; color:var(--muted); font-weight:700; width:22px;}
  .resbox{background:var(--blue-t); border-radius:13px; padding:13px 15px; margin-top:14px; display:flex; align-items:center; justify-content:space-between;}
  .resbox .rl{font-size:13px; font-weight:700; color:var(--blue);}
  .resbox .rv{font-size:22px; font-weight:800; color:var(--blue);} .resbox .rv small{font-size:13px;}
  .seg{display:flex; gap:6px; margin:6px 0 4px;}
  .seg button{flex:1; border:1.5px solid var(--line); background:var(--card); color:var(--sub); border-radius:11px; padding:9px 0; font-weight:700; font-size:13px; cursor:pointer;}
  .seg button.on{background:var(--blue); border-color:var(--blue); color:#fff;}
  .wout{display:flex; gap:8px; margin-top:12px;}
  .wout .o{flex:1; background:var(--card2); border-radius:12px; padding:11px 6px; text-align:center;}
  .wout .o .l{font-size:10.5px; color:var(--muted); font-weight:700;} .wout .o .v{font-size:19px; font-weight:800; margin-top:3px;}
  .g-sec{margin:20px 2px 2px; font-size:13.5px; font-weight:800; color:var(--blue);}
  .g-item{padding:11px 0; border-top:1px solid var(--line);} .g-item:first-of-type{border-top:0;}
  .g-item .t{font-weight:800; font-size:13.5px;} .g-item .b{color:var(--sub); font-size:12.5px; line-height:1.55; margin-top:3px;}
  textarea.io{width:100%; height:76px; background:var(--card2); border:1.5px solid var(--line); border-radius:11px; color:var(--ink); font-size:11px; padding:10px; font-family:ui-monospace,monospace; resize:vertical;}
  .rowbtns{display:flex; gap:8px; margin-top:10px;}
  .rowbtns button{flex:1; border:1.5px solid var(--line); background:var(--card); color:var(--ink); border-radius:11px; padding:12px 0; font-weight:700; font-size:13.5px; cursor:pointer;}
  .rowbtns button.warn{border-color:var(--down); color:var(--down);}

  /* flow blocks (walk/stretch) */
  .flow{display:flex; align-items:center; gap:12px; background:var(--card); border-radius:15px; padding:12px 14px; margin:10px 0; box-shadow:var(--sh);}
  .flow.done{opacity:.66;}
  .flow .fic{flex:0 0 auto; width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px;}
  .flow .fmid{flex:1; min-width:0;}
  .flow .ft{font-size:14px; font-weight:800; letter-spacing:-.01em;}
  .flow .ft .fmin{font-size:11px; font-weight:700; color:var(--blue); background:var(--blue-t); border-radius:6px; padding:1px 6px; margin-left:4px;}
  .flow .fd{font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4;}
  .flow.done .ft{text-decoration:line-through; text-decoration-color:var(--muted);}
  /* banners */
  .banner{border-radius:12px; padding:10px 12px; margin:12px 0 4px; font-size:12.5px; line-height:1.55;}
  .banner b{font-weight:800;}
  .banner.danger{background:#FDECEE; color:#B4232E;}
  .banner.danger .why{color:#C7616A; font-size:11px;}
  .banner.danger .prime{color:#8a2b32; font-size:11.5px;}
  .banner.ok{background:#E4F8F0; color:#0E7A55;}
  .banner.maint{background:var(--card2); color:var(--sub);}
  /* warmup box */
  .warmbox{background:var(--card2); border-radius:12px; padding:9px 12px; margin:12px 0 4px;}
  .wlab{font-size:10.5px; font-weight:800; color:var(--muted); letter-spacing:.04em; margin-bottom:5px;}
  .wrow{display:flex; align-items:center; gap:10px; padding:3px 0; font-size:13px;}
  .wrow .wn{width:26px; font-weight:800; color:var(--blue); font-size:11px;}
  .wrow .ww{font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums; min-width:56px;}
  .wrow .wr{color:var(--muted); font-size:12px;}
  .worklab-wrap{margin-top:12px;}
  .worklab-wrap .wlab{margin:0 0 6px 2px;}
  .setrow.bo .snum{background:var(--c-arms); color:#fff; font-size:10px; width:auto; padding:0 5px; border-radius:9px;}
  .hintline{font-size:11.5px; color:var(--muted); padding:6px 2px 0; line-height:1.5;}
  .hintline b{color:var(--sub); font-weight:800;}
  /* intensifier rows */
  .intens{display:flex; gap:8px; align-items:flex-start; border-radius:11px; padding:9px 11px; margin-top:9px; font-size:12px; line-height:1.5;}
  .intens .ilab{flex:0 0 auto; font-weight:800;}
  .intens.rp{background:#FEECEC; color:#C0392B;}
  .intens.drop{background:#EAF2FF; color:#2E6BDE;}
  /* collapsed completed card */
  .card.collapsed{padding:0;}
  .cbar{display:flex; align-items:center; gap:9px; padding:13px 15px; cursor:pointer;}
  .cbar .cchk{width:22px; height:22px; border-radius:50%; background:var(--up); color:#fff; font-size:13px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .cbar b{font-size:14.5px;}
  .cbar .csum{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums;}
  .cbar .cexp{margin-left:auto; font-size:11.5px; color:var(--blue); font-weight:700;}
  /* done popup */
  .donepop{margin-top:12px; background:#E4F8F0; border-radius:12px; padding:11px 13px; display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:12.5px; color:#0E7A55;}
  .donepop b{font-weight:800;} .donepop .cd{font-weight:800;}
  .donepop .nope{flex:0 0 auto; border:1.5px solid #12B886; background:var(--card); color:#0E7A55; border-radius:9px; padding:7px 11px; font-size:12px; font-weight:800; cursor:pointer;}

  nav.tabs{position:fixed; left:0; right:0; bottom:0; z-index:30; background:rgba(255,255,255,.94); backdrop-filter:blur(14px); border-top:1px solid var(--line); display:flex; max-width:480px; margin:0 auto; padding:7px 4px calc(7px + env(safe-area-inset-bottom));}
  nav.tabs button{flex:1; background:none; border:0; color:var(--muted); font-size:10.5px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:3px; padding:5px 0; cursor:pointer;}
  nav.tabs button svg{width:23px; height:23px; stroke:currentColor; fill:none; stroke-width:1.9;}
  nav.tabs button.on{color:var(--blue);}
  .view{display:none;} .view.on{display:block; animation:fade .2s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(5px);} to{opacity:1; transform:none;}}
  @media (prefers-reduced-motion:reduce){.view.on{animation:none;}}

var KEY="healthy_log_v2";

function load(){ try{ var o=JSON.parse(localStorage.getItem(KEY)); if(o&&o.logs){ o.blocks=o.blocks||{}; o.collapsed=o.collapsed||{}; o.memos=o.memos||{}; migrate(o); return o; } }catch(e){} return {day:"d1",week:0,startWeek:null,logs:{},memos:{},blocks:{},collapsed:{}}; }
function migrate(o){ var R={"d3|시티드 카프레이즈":"d3|스탠딩 카프레이즈"}; var moved=false;
  for(var k in R){ var nk=R[k];
    if(o.logs[k]){ if(!o.logs[nk]) o.logs[nk]=o.logs[k]; else o.logs[nk]=o.logs[nk].concat(o.logs[k]); delete o.logs[k]; moved=true; }
    if(o.memos[k]&&!o.memos[nk]){ o.memos[nk]=o.memos[k]; delete o.memos[k]; }
  }
  if(moved){ try{ localStorage.setItem(KEY,JSON.stringify(o)); }catch(e){} }
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} }
function keyFor(id,n){ return id+"|"+n; }

function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseD(s){ var a=s.split("-"); return new Date(+a[0],+a[1]-1,+a[2],12,0,0); }
function weekIdx(s){ var d=parseD(s); var day=(d.getDay()+6)%7; var mon=new Date(d); mon.setDate(d.getDate()-day); return Math.round(mon.getTime()/6.048e8); }
var CUR_WEEK=weekIdx(todayStr());
if(DB.startWeek==null){ DB.startWeek=CUR_WEEK; save(); }

function e1rm(w,r){ return w>0&&r>0? w*(1+r/30):0; }
function round25(x){ return Math.round(x/2.5)*2.5; }
function fmt(n){ return (Math.round(n*10)/10).toString().replace(/\.0$/,""); }
function parseSets(w){ var m=/^(\d+)×(\d+)(?:-(\d+))?/.exec(w); if(!m) return {sets:3,lo:8,hi:12}; return {sets:+m[1],lo:+m[2],hi:m[3]?+m[3]:+m[2]}; }

function sessions(k){ return DB.logs[k]||[]; }
function sessionOn(k,date){ var a=sessions(k); for(var i=0;i<a.length;i++) if(a[i].date===date) return a[i]; return null; }
function bestE1(sess){ if(!sess||!sess.sets) return 0; var b=0; sess.sets.forEach(function(s){ b=Math.max(b,e1rm(s.w,s.r)); }); return b; }
function weekBestE1(k,wi){ var b=0; sessions(k).forEach(function(s){ if(weekIdx(s.date)===wi) b=Math.max(b,bestE1(s)); }); return b; }
function lastSessionBefore(k,date){ var a=sessions(k),r=null; a.forEach(function(s){ if(s.date<date) r=s; }); return r; }

function progPct(){
  // sessions logged this week / total training exercises
  var total=0,done=0;
  PROGRAM.forEach(function(d){ if(d.rest) return; d.ex.forEach(function(ex){ total++; var s=sessionOn(keyFor(d.id,ex.n),todayStr()); }); });
  // weekly completion: count exercises with any done set this week
  var wk=DB.week||0; PROGRAM.forEach(function(d){ if(d.rest) return; d.ex.forEach(function(ex){
    var any=sessions(keyFor(d.id,ex.n)).some(function(s){ return weekIdx(s.date)===CUR_WEEK && s.sets.some(function(x){return x.done;}); }); if(any) done++;
  }); });
  return total? Math.round(done/total*100):0;
}

  var cta=document.createElement("div"); cta.className="cta";

function warmRows(ex,baseW,isFirst){
  var out='';
  var rows=[];
  if(isFirst) rows.push(['활성화','최소무게',30]);
  if(SCHEME[ex.s]){ SCHEME[ex.s].forEach(function(p){ rows.push(['W', baseW>0?fmt(round25(baseW*p[0]))+'kg':(p[0]*100)+'%', p[1]]); }); }
  if(!rows.length) return '';
  return '<div class="warmbox"><div class="wlab">웜업 세트</div>'+rows.map(function(r,i){
    return '<div class="wrow"><span class="wn">'+(r[0]==='활성화'?'⚡':'W'+i)+'</span><span class="ww">'+r[1]+'</span><span class="wr">×'+r[2]+(r[0]==='활성화'?'회 (가볍게 풀기)':'회')+'</span></div>';
  }).join('')+'</div>';
}
function exCard(d,ex,isFirst){
  var k=keyFor(d.id,ex.n), t=todayStr(), ps=parseSets(ex.w);
  var sess=sessionOn(k,t); if(!sess){ sess={date:t,sets:[]}; }
  var prev=lastSessionBefore(k,t);
  var want=ps.sets+(ex.bo?1:0);
  while(sess.sets.length<want){ var i=sess.sets.length; var pv=prev&&prev.sets[i]; sess.sets.push({w:pv?pv.w:0,r:pv?pv.r:ps.lo,done:false}); }
  var kt=k+"|"+t;
  var allDone=sess.sets.length>0 && sess.sets.every(function(x){return x.done;});
  var card=document.createElement("div"); card.className="card";
  // collapsed view (완료 후 접기)
  if(allDone && DB.collapsed[kt] && COMPLETE_POPUP!==kt){
    var bt=bestTop(sess);
    card.className="card collapsed";
    card.innerHTML='<div class="cbar"><span class="cchk">✓</span><b>'+ex.n+'</b><span class="csum">'+fmt(bt.w)+'kg × '+bt.r+' 완료</span><span class="cexp">펼치기 ▾</span></div>';
    card.querySelector(".cbar").onclick=function(){ delete DB.collapsed[kt]; save(); renderDayBody(); };
    return card;
  }
  var thisB=weekBestE1(k,CUR_WEEK), lastB=weekBestE1(k,CUR_WEEK-1);
  var wow='';
  if(lastB>0){ var diff=thisB-lastB; if(thisB!==0){ var c=diff>0.5?"up":(diff<-0.5?"down":"flat"); var ar=diff>0.5?"▲":(diff<-0.5?"▼":"–"); wow='<div class="wow '+c+'">'+ar+' '+fmt(Math.abs(diff))+'</div>'; } }
  else if(thisB>0){ wow='<div class="wow flat">이번주</div>'; }
  var lastTxt = prev? '지난 '+fmt(bestTop(prev).w)+'kg·'+bestTop(prev).r+'회' : '첫 기록';
  card.innerHTML='<div class="exhead"><div class="exmeta"><div class="exname">'+(ex.ss?'<span class="ss">슈퍼 '+ex.ss+'</span>':'')+ex.n+'</div>'+
    '<div class="exsub">'+ex.w.replace("×","세트 ")+'회 · 휴식 '+ex.rest+' · ⏱~'+ex.t+'분 · <span class="last">'+lastTxt+'</span></div></div>'+
    '<div class="badge">'+wow+'</div></div>';
  // 안전/메인 배너
  if(ex.risky){ var sb=document.createElement("div"); sb.className="banner danger";
    sb.innerHTML='⚠️ <b>무게 욕심 버려.</b> 자세·호흡·근육인지.<br><span class="prime">선행: 브레이싱 → 힙힌지 5회 → 맥길빅3(버드독·데드버그·사이드플랭크 10초씩)</span>';
    card.appendChild(sb); }
  else if(ex.main){ var mn=document.createElement("div"); mn.className="banner ok";
    mn.innerHTML='🔥 <b>안전 기구.</b> 마지막 세트는 <b>실패지점까지.</b>'; card.appendChild(mn); }
  else if(ex.maint){ var mt=document.createElement("div"); mt.className="banner maint";
    mt.innerHTML='🟦 <b>유지.</b> RIR 1-2, 무게만 지켜.'; card.appendChild(mt); }
  // recommendation
  var baseE=0; sessions(k).forEach(function(s){ baseE=Math.max(baseE,bestE1(s)); });
  var topW=0; sess.sets.forEach(function(s,ix){ if(ix<ps.sets&&s.w>topW) topW=s.w; }); if(topW===0&&prev) topW=bestTop(prev).w;
  var recWrap=document.createElement("div");
  if(SCHEME[ex.s]!==undefined && baseE>0){
    var tr=ps.lo, base=baseE/(1+tr/30);
    recWrap.innerHTML='<div class="recos">'+recoEl("쉬움",round25(base*0.95),tr,"")+recoEl("적정",round25(base),tr,"mid")+recoEl("도전",round25(base*1.03),tr,"")+
      '</div><div class="recohint">'+tr+'회 기준 추천. 탭=채움.</div>';
  } else recWrap.innerHTML='<div class="recohint" style="margin-top:12px">첫 세트 넣으면 다음부턴 무게 추천.</div>';
  card.appendChild(recWrap);
  recWrap.querySelectorAll(".reco").forEach(function(r){ r.onclick=function(){ var w=+r.getAttribute("data-w"),rp=+r.getAttribute("data-r"); sess.sets.forEach(function(s,ix){ if(!s.done&&ix<ps.sets){ s.w=w; s.r=rp; } }); persist(k,sess); renderDayBody(); }; });
  // 웜업 세트
  var wm=document.createElement("div"); wm.innerHTML=warmRows(ex,topW,isFirst); if(wm.firstChild) card.appendChild(wm.firstChild);
  // 워킹 세트 (+백오프)
  var setWrap=document.createElement("div"); setWrap.className="worklab-wrap";
  var wl=document.createElement("div"); wl.className="wlab"; wl.textContent="워킹 세트"; setWrap.appendChild(wl);
  sess.sets.forEach(function(stt,idx){
    var isBo=idx>=ps.sets;
    var row=document.createElement("div"); row.className="setrow"+(stt.done?" done":"")+(isBo?" bo":"");
    if(isBo && !stt.w && topW) stt.w=round25(topW*0.5);
    row.innerHTML='<div class="snum">'+(isBo?'BO':(idx+1))+'</div>'+
      stp("w",stt.w,2.5)+'<span class="unit">kg</span>'+
      stp("r",stt.r,1)+'<span class="unit">회</span>'+
      '<button class="chk"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></button>';
    var wI=row.querySelector('[data-f="w"]'), rI=row.querySelector('[data-f="r"]');
    wI.addEventListener("input",function(){ stt.w=parseFloat(wI.value)||0; persist(k,sess); });
    rI.addEventListener("input",function(){ stt.r=parseInt(rI.value)||0; persist(k,sess); });
    row.querySelector(".chk").onclick=function(){ stt.done=!stt.done; if(stt.done&&(!stt.w||!stt.r)){ toast("무게·횟수를 먼저 입력하세요"); stt.done=false; return; } persist(k,sess);
      var nowAll=sess.sets.every(function(x){return x.done;});
      if(stt.done && nowAll){ COMPLETE_POPUP=kt; } if(stt.done) toast("e1RM "+fmt(e1rm(stt.w,stt.r))+"kg");
      renderDayBody(); };
    setWrap.appendChild(row);
  });
  if(ex.bo){ var boh=document.createElement("div"); boh.className="hintline"; boh.innerHTML='↳ <b>BO</b> 마지막 세트 후 50%로 실패까지 1세트'; setWrap.appendChild(boh); }
  card.appendChild(setWrap);
  // 인텐시파이어 열 (레스트포즈 / 드롭) — 마지막 워킹세트만
  var tech=ex.tech||"";
  if(tech.indexOf("레스트포즈")>=0){ var rp=document.createElement("div"); rp.className="intens rp";
    rp.innerHTML='<span class="ilab">🔴 레스트포즈</span><span>마지막 세트만 · 실패→20초→3-5회 ×2</span>'; card.appendChild(rp); }
  if(tech.indexOf("드롭")>=0){ var dr=document.createElement("div"); dr.className="intens drop";
    var trip=tech.indexOf("트리플")>=0;
    dr.innerHTML='<span class="ilab">🔻 '+(trip?'트리플 드롭':'드롭')+'</span><span>마지막 세트만 · 20-30%↓ 실패까지'+(trip?' ×3':'')+'</span>'; card.appendChild(dr); }
  // foot: e1rm + memo
  var foot=document.createElement("div"); foot.className="exfoot";
  var be=bestTop(sess), e1=e1rm(be.w,be.r);
  foot.innerHTML='<span class="e1tag">'+(e1>0?'추정 1RM <b>'+fmt(e1)+'kg</b>':'&nbsp;')+'</span><button class="memoBtn">메모 '+(DB.memos[k]?'●':'')+'</button>';
  card.appendChild(foot);
  var mb=document.createElement("div"); mb.className="memoBox";
  mb.innerHTML='<textarea placeholder="자세 팁 · 기구 세팅값(핀/시트 높이) 등을 남겨두세요">'+(DB.memos[k]||"")+'</textarea>';
  card.appendChild(mb);
  foot.querySelector(".memoBtn").onclick=function(){ mb.classList.toggle("open"); if(mb.classList.contains("open")) mb.querySelector("textarea").focus(); };
  mb.querySelector("textarea").addEventListener("input",function(){ DB.memos[k]=this.value; save(); });
  if(DB.memos[k]){ var pn=document.createElement("div"); pn.className="pinned"; pn.innerHTML='<span class="pin">📌</span><span>'+esc(DB.memos[k])+'</span>'; card.appendChild(pn); }
  if(ex.m){ var mm=document.createElement("div"); mm.className="pinned"; mm.style.background="var(--card2)"; mm.style.color="var(--sub)"; mm.innerHTML='<span class="pin">💡</span><span>'+ex.m+'</span>'; card.appendChild(mm); }
  // 완료 팝업 (5초 뒤 자동 접기)
  if(COMPLETE_POPUP===kt){
    var pop=document.createElement("div"); pop.className="donepop";
    pop.innerHTML='<span>✅ <b>'+ex.n+'</b> 완료! <span class="cd">5</span>초 뒤 접혀요</span><button class="nope">아니오, 더 할래요</button>';
    card.appendChild(pop);
    var n=5, cd=pop.querySelector(".cd");
    clearInterval(popupTimer);
    popupTimer=setInterval(function(){ n--; if(cd) cd.textContent=n; if(n<=0){ clearInterval(popupTimer); DB.collapsed[kt]=1; COMPLETE_POPUP=null; save(); renderDayBody(); } },1000);
    pop.querySelector(".nope").onclick=function(){ clearInterval(popupTimer); COMPLETE_POPUP=null; renderDayBody(); };
  }
  return card;
}
function recoEl(lab,w,r,cls){ return '<div class="reco '+cls+'" data-w="'+w+'" data-r="'+r+'"><div class="rl">'+lab+'</div><div class="rv">'+fmt(w)+'<small>kg</small></div></div>'; }
function bestTop(sess){ var b={w:0,r:0},be=0; (sess.sets||[]).forEach(function(s){ var e=e1rm(s.w,s.r); if(e>be){be=e;b={w:s.w,r:s.r};} }); return b; }
function stp(f,v,step){ return '<div class="stp"><button data-step="'+(-step)+'">−</button><input data-f="'+f+'" type="number" inputmode="decimal" value="'+(v||"")+'" placeholder="0"><button data-step="'+step+'">＋</button></div>'; }
function persist(k,sess){ var a=sessions(k); var found=false; for(var i=0;i<a.length;i++){ if(a[i].date===sess.date){ a[i]=sess; found=true; } } if(!found) a.push(sess); DB.logs[k]=a; save(); }
document.addEventListener("click",function(e){ var b=e.target.closest("button[data-step]"); if(!b) return; var inp=b.parentNode.querySelector("input"); var v=parseFloat(inp.value)||0,s=parseFloat(b.getAttribute("data-step")); v=Math.max(0,Math.round((v+s)*100)/100); inp.value=v; inp.dispatchEvent(new Event("input",{bubbles:true})); });

/* ============ STATS ============ */
function allSessionsWeek(wi){ var out=[]; PROGRAM.forEach(function(d){ if(d.rest) return; d.ex.forEach(function(ex){ var k=keyFor(d.id,ex.n); sessions(k).forEach(function(s){ if(weekIdx(s.date)===wi) out.push({ex:ex,s:s}); }); }); }); return out; }
function volOf(s){ var v=0; s.sets.forEach(function(x){ if(x.w>0&&x.r>0) v+=x.w*x.r; }); return v; }
function renderStats(){
  var host=document.getElementById("v-stats"); host.innerHTML="";
  var thisW=allSessionsWeek(CUR_WEEK), lastW=allSessionsWeek(CUR_WEEK-1);
  var tv=thisW.reduce(function(a,x){return a+volOf(x.s);},0);
  var lv=lastW.reduce(function(a,x){return a+volOf(x.s);},0);
  if(tv===0 && Object.keys(DB.logs).length===0){ host.innerHTML='<div class="stat-card"><div class="empty">아직 기록이 없어요.<br>오늘 탭에서 세트를 체크하면<br>여기에 볼륨과 성장 그래프가 쌓여요 📈</div></div>'; return; }
  // volume card
  var wowTxt='';
  if(lv>0){ var p=Math.round((tv-lv)/lv*100); wowTxt=p>=0?'<span style="color:var(--up)">▲ 지난주보다 '+p+'% 늘었어요</span>':'<span style="color:var(--down)">▼ 지난주보다 '+Math.abs(p)+'% 줄었어요</span>'; }
  else wowTxt='<span style="color:var(--muted)">다음 주부터 지난주 대비가 나와요</span>';
  var vc='<div class="stat-card"><div class="cap">이번 주 총 볼륨</div><div class="big num">'+fmt(Math.round(tv))+'<small> kg</small></div><div class="wowline">'+wowTxt+'</div>';
  // weekday chart (stacked by bp)
  var byDay={}; for(var i=0;i<7;i++) byDay[i]={};
  thisW.forEach(function(x){ var wd=(parseD(x.s.date).getDay()+6)%7; byDay[wd][x.ex.bp]=(byDay[wd][x.ex.bp]||0)+volOf(x.s); });
  var maxDay=1; for(var j=0;j<7;j++){ var sum=0; for(var b in byDay[j]) sum+=byDay[j][b]; maxDay=Math.max(maxDay,sum); }
  var names=["월","화","수","목","금","토","일"]; var todayWd=(new Date().getDay()+6)%7;
  var chart='<div class="chart">'+names.map(function(nm,idx){
    var segs=BPS.map(function(bp){ var v=byDay[idx][bp]||0; if(!v) return ""; return '<div class="seg" style="height:'+(v/maxDay*100)+'%;background:'+BPC[bp]+'"></div>'; }).join("");
    var tot=0; for(var b in byDay[idx]) tot+=byDay[idx][b];
    return '<div class="col"><div class="stack" style="height:'+(tot/maxDay*100)+'%">'+segs+'</div><div class="lab'+(idx===todayWd?' today':'')+'">'+nm+'</div></div>';
  }).join("")+'</div></div>';
  host.innerHTML=vc+chart;
  // body part balance
  var bpv={}; thisW.forEach(function(x){ bpv[x.ex.bp]=(bpv[x.ex.bp]||0)+volOf(x.s); });
  var maxbp=1; BPS.forEach(function(b){ maxbp=Math.max(maxbp,bpv[b]||0); });
  var bc=document.createElement("div"); bc.className="stat-card";
  bc.innerHTML='<div class="cap">부위별 볼륨 밸런스</div><div class="bpbars">'+BPS.map(function(bp){
    var v=bpv[bp]||0; return '<div class="bpbar"><div class="nm">'+bp+'</div><div class="track"><div class="fill" style="width:'+(v/maxbp*100)+'%;background:'+BPC[bp]+'"></div></div><div class="vv num">'+fmt(Math.round(v))+'kg</div></div>';
  }).join("")+'</div>'; host.appendChild(bc);
  // 1RM growth per exercise (>=2 weeks)
  var growth=[];
  PROGRAM.forEach(function(d){ if(d.rest) return; d.ex.forEach(function(ex){
    var k=keyFor(d.id,ex.n); var byW={}; sessions(k).forEach(function(s){ var wi=weekIdx(s.date); byW[wi]=Math.max(byW[wi]||0,bestE1(s)); });
    var wks=Object.keys(byW).map(Number).sort(function(a,b){return a-b;}); if(wks.length<2) return;
    var series=wks.map(function(w){return byW[w];}); var first=series[0],last=series[series.length-1];
    growth.push({n:ex.n,bp:ex.bp,series:series,pct:first>0?Math.round((last-first)/first*100):0,last:last});
  }); });
  var gc=document.createElement("div"); gc.className="stat-card";
  if(growth.length===0){ gc.innerHTML='<div class="cap">1RM 성장 추이</div><div class="empty" style="padding:18px">2주 이상 기록하면<br>종목별 성장 그래프가 나와요</div>'; }
  else { growth.sort(function(a,b){return b.pct-a.pct;});
    gc.innerHTML='<div class="cap">1RM 성장 추이</div>'+growth.map(function(g){
      return '<div class="spark"><div style="min-width:0"><div class="sn">'+g.n+'</div><div class="ssub">최고 '+fmt(g.last)+'kg</div></div>'+sparkline(g.series,g.pct)+'<div class="grow" style="color:'+(g.pct>=0?"var(--up)":"var(--down)")+'">'+(g.pct>=0?"+":"")+g.pct+'%</div></div>';
    }).join(""); }
  host.appendChild(gc);
}
function sparkline(series,pct){
  var w=72,h=30,pad=3,n=series.length,mn=Math.min.apply(null,series),mx=Math.max.apply(null,series),rng=(mx-mn)||1;
  var pts=series.map(function(v,i){ var x=pad+i/(n-1)*(w-2*pad); var y=h-pad-(v-mn)/rng*(h-2*pad); return x+","+y; });
  var col=pct>=0?"#12B886":"#F04452";
  var last=pts[pts.length-1].split(",");
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><polyline points="'+pts.join(" ")+'" fill="none" stroke="'+col+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.8" fill="'+col+'"/></svg>';
}

  '<div class="m-card"><h3>1RM 계산기</h3><div class="sb">추정 최대 중량 (Epley)</div>'+
