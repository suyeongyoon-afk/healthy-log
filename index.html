<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HEALTHY">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3182F6">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>HEALTHY — 트레이닝 로그</title>
</head>
<body>
<style>
  :root{
    --bg:#F2F4F6; --card:#FFFFFF; --card2:#F7F8FA;
    --blue:#3182F6; --blue-d:#2870E0; --blue-t:#EAF2FF;
    --ink:#191F28; --sub:#4E5968; --muted:#8B95A1; --line:#E5E8EB;
    --up:#12B886; --down:#F04452; --yellow:#FFF6D6; --yellow-b:#F2C94C;
    --c-chest:#FF6B6B; --c-back:#4C6EF5; --c-shoulder:#FF922B; --c-legs:#3182F6;
    --c-arms:#9775FA; --c-abs:#20C997; --c-calf:#F06595;
    --r:18px; --sh:0 1px 3px rgba(0,20,60,.06),0 1px 2px rgba(0,20,60,.04);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Noto Sans KR",system-ui,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased; letter-spacing:-.01em;
  }
  .app{max-width:480px; margin:0 auto; padding:0 16px 92px; min-height:100vh;}
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  button{font-family:inherit; letter-spacing:-.01em;}

  header.top{position:sticky; top:0; z-index:20; background:var(--bg); padding:18px 0 8px;}
  .htitle{font-size:22px; font-weight:800; letter-spacing:-.03em;}
  .hsub{color:var(--muted); font-size:13px; margin-top:1px;}

  /* program progress card */
  .prog{background:linear-gradient(135deg,#3182F6,#4C6EF5); color:#fff; border-radius:20px; padding:18px; margin:8px 0 14px; box-shadow:0 6px 18px rgba(49,130,246,.28);}
  .prog .pname{font-size:17px; font-weight:800;}
  .prog .pweek{font-size:12.5px; opacity:.85; margin-top:2px;}
  .prog .bar{height:7px; background:rgba(255,255,255,.28); border-radius:5px; margin-top:13px; overflow:hidden;}
  .prog .bar i{display:block; height:100%; background:#fff; border-radius:5px;}
  .prog .pmeta{display:flex; justify-content:space-between; font-size:12px; margin-top:8px; opacity:.92;}

  .weeks{display:flex; gap:8px; overflow-x:auto; padding:2px 0 6px; scrollbar-width:none;}
  .weeks::-webkit-scrollbar{display:none;}
  .wtab{flex:0 0 auto; border:0; background:none; color:var(--muted); font-size:14px; font-weight:700; padding:6px 4px; position:relative;}
  .wtab.on{color:var(--ink);}
  .wtab.on:after{content:""; position:absolute; left:4px; right:4px; bottom:-1px; height:2.5px; background:var(--ink); border-radius:2px;}

  .days{display:flex; gap:9px; overflow-x:auto; padding:8px 0 6px; scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .dchip{flex:0 0 auto; width:62px; border:0; background:var(--card); border-radius:16px; padding:11px 0; box-shadow:var(--sh); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px;}
  .dchip .ic{width:34px; height:34px; border-radius:11px; background:var(--card2); display:flex; align-items:center; justify-content:center;}
  .dchip .ic svg{width:19px; height:19px; stroke:var(--muted); fill:none; stroke-width:2;}
  .dchip .dl{font-size:12px; font-weight:700; color:var(--sub);}
  .dchip.on{background:var(--blue);}
  .dchip.on .dl{color:#fff;} .dchip.on .ic{background:rgba(255,255,255,.2);} .dchip.on .ic svg{stroke:#fff;}
  .dchip.done .ic{background:#E4F8F0;} .dchip.done .ic svg{stroke:var(--up);}
  .dchip.done.on .ic{background:rgba(255,255,255,.2);} .dchip.done.on .ic svg{stroke:#fff;}

  .dayhead{margin:14px 2px 2px;}
  .dayhead h2{margin:0; font-size:19px; font-weight:800; letter-spacing:-.02em;}
  .dayhead .focus{color:var(--sub); font-size:13.5px; margin-top:2px;}

  .cardio{background:var(--card); border-radius:14px; padding:12px 14px; margin:12px 0; box-shadow:var(--sh); color:var(--sub); font-size:13px; display:flex; gap:9px; align-items:flex-start;}
  .cardio .ci{flex:0 0 auto; width:22px; height:22px; color:var(--blue);}
  .cardio b{color:var(--ink);}

  .card{background:var(--card); border-radius:var(--r); padding:15px; margin:12px 0; box-shadow:var(--sh);}
  .exhead{display:flex; align-items:center; gap:11px;}
  .bp{flex:0 0 auto; width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:800;}
  .exmeta{flex:1; min-width:0;}
  .exname{font-size:16px; font-weight:800; letter-spacing:-.02em; line-height:1.25;}
  .exname .ss{font-size:10px; font-weight:800; color:var(--blue); background:var(--blue-t); border-radius:5px; padding:1px 5px; margin-right:5px; vertical-align:1.5px;}
  .exsub{color:var(--muted); font-size:12.5px; margin-top:2px;}
  .exsub .last{color:var(--sub); font-weight:600;}
  .badge{flex:0 0 auto; text-align:right;}
  .badge .wow{font-size:12px; font-weight:800; padding:4px 8px; border-radius:9px;}
  .wow.up{color:var(--up); background:#E4F8F0;} .wow.down{color:var(--down); background:#FDECEE;} .wow.flat{color:var(--muted); background:var(--card2);}

  .recos{display:flex; gap:7px; margin:13px 0 6px;}
  .reco{flex:1; border:1.5px solid var(--line); background:var(--card); border-radius:13px; padding:8px 4px; text-align:center; cursor:pointer;}
  .reco.mid{border-color:var(--blue); background:var(--blue-t);}
  .reco .rl{font-size:11px; color:var(--muted); font-weight:700;}
  .reco.mid .rl{color:var(--blue);}
  .reco .rv{font-size:15px; font-weight:800; margin-top:2px;} .reco .rv small{font-size:11px; color:var(--muted); font-weight:700;}
  .recohint{font-size:11.5px; color:var(--muted); margin:2px 2px 10px;}

  .setrow{display:flex; align-items:center; gap:8px; padding:7px 0; border-top:1px solid var(--line);}
  .setrow:first-of-type{border-top:0;}
  .snum{flex:0 0 auto; width:22px; height:22px; border-radius:50%; background:var(--card2); color:var(--muted); font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center;}
  .setrow.done .snum{background:var(--up); color:#fff;}
  .stp{display:flex; align-items:center; background:var(--card2); border-radius:10px; overflow:hidden;}
  .stp button{width:30px; height:38px; border:0; background:transparent; color:var(--sub); font-size:18px; font-weight:600; cursor:pointer;}
  .stp button:active{background:var(--blue-t);}
  .stp input{width:44px; border:0; background:transparent; text-align:center; font-size:15px; font-weight:800; color:var(--ink); padding:0; -moz-appearance:textfield; font-variant-numeric:tabular-nums;}
  .stp input::-webkit-outer-spin-button,.stp input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .unit{font-size:11px; color:var(--muted); font-weight:700; margin-left:-3px;}
  .chk{flex:0 0 auto; margin-left:auto; width:30px; height:30px; border-radius:50%; border:2px solid var(--line); background:var(--card); cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0;}
  .chk svg{width:16px; height:16px; stroke:var(--muted); fill:none; stroke-width:2.6;}
  .setrow.done .chk{background:var(--up); border-color:var(--up);} .setrow.done .chk svg{stroke:#fff;}

  .exfoot{display:flex; align-items:center; justify-content:space-between; margin-top:10px;}
  .memoBtn{background:var(--card2); border:0; border-radius:9px; color:var(--sub); font-size:12px; font-weight:700; padding:7px 11px; cursor:pointer;}
  .e1tag{font-size:12px; color:var(--muted); font-weight:600;} .e1tag b{color:var(--ink); font-weight:800;}
  .memoBox{margin-top:10px; display:none;}
  .memoBox.open{display:block;}
  .memoBox textarea{width:100%; height:56px; border:1.5px solid var(--line); border-radius:11px; background:var(--card2); padding:10px; font-family:inherit; font-size:13px; color:var(--ink); resize:none;}
  .pinned{background:var(--yellow); border-radius:12px; padding:10px 12px; margin-top:10px; font-size:12.5px; color:#8a6d1a; display:flex; gap:8px;}
  .pinned .pin{flex:0 0 auto;}

  .cta{margin:20px 0 6px;}
  .cta button{width:100%; border:0; background:var(--blue); color:#fff; font-size:16px; font-weight:800; border-radius:15px; padding:16px; box-shadow:0 6px 16px rgba(49,130,246,.32); cursor:pointer;}
  .cta button:active{background:var(--blue-d);}
  .cta button.done{background:var(--up); box-shadow:0 6px 16px rgba(18,184,134,.3);}

  .rest-card{background:var(--card); border-radius:var(--r); padding:28px 18px; text-align:center; box-shadow:var(--sh); margin:14px 0;}
  .rest-card .em{width:56px; height:56px; margin:0 auto 12px; border-radius:18px; background:var(--blue-t); display:flex; align-items:center; justify-content:center;}
  .rest-card .em svg{width:28px; height:28px; stroke:var(--blue); fill:none; stroke-width:2;}
  .rest-card h3{margin:0 0 6px; font-size:18px;} .rest-card p{margin:0; color:var(--sub); font-size:13.5px;}

  /* stats */
  .stat-card{background:var(--card); border-radius:var(--r); padding:17px; margin:12px 0; box-shadow:var(--sh);}
  .stat-card .cap{color:var(--muted); font-size:13px; font-weight:700;}
  .stat-card .big{font-size:30px; font-weight:800; letter-spacing:-.03em; margin-top:3px;} .stat-card .big small{font-size:16px; color:var(--muted); font-weight:800;}
  .wowline{font-size:13px; font-weight:700; margin-top:5px;}
  .chart{display:flex; align-items:flex-end; gap:8px; height:110px; margin:16px 4px 4px;}
  .chart .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
  .chart .stack{width:60%; max-width:26px; border-radius:6px 6px 3px 3px; display:flex; flex-direction:column-reverse; overflow:hidden; min-height:3px;}
  .chart .seg{width:100%;}
  .chart .lab{font-size:11px; color:var(--muted); font-weight:700;}
  .chart .lab.today{color:var(--blue);}
  .bpbars{margin-top:6px;}
  .bpbar{display:flex; align-items:center; gap:10px; padding:7px 0;}
  .bpbar .nm{width:34px; font-size:12.5px; font-weight:700; color:var(--sub);}
  .bpbar .track{flex:1; height:9px; background:var(--card2); border-radius:6px; overflow:hidden;}
  .bpbar .fill{height:100%; border-radius:6px;}
  .bpbar .vv{font-size:12px; font-weight:800; color:var(--ink); width:64px; text-align:right;}
  .spark{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:10px 0; border-top:1px solid var(--line);}
  .spark:first-of-type{border-top:0;}
  .spark .sn{font-size:13.5px; font-weight:700;} .spark .ssub{font-size:11.5px; color:var(--muted); margin-top:1px;}
  .spark svg{flex:0 0 auto;}
  .spark .grow{font-size:13px; font-weight:800; text-align:right;}
  .empty{text-align:center; color:var(--muted); font-size:13.5px; padding:30px 10px;}

  /* program list */
  .p-day{margin:18px 2px 4px; font-size:16px; font-weight:800; display:flex; align-items:center; gap:8px;}
  .p-day .dot{width:8px; height:8px; border-radius:50%;}
  .p-ex{background:var(--card); border-radius:14px; padding:12px 14px; margin:8px 0; box-shadow:var(--sh); display:flex; gap:11px; align-items:flex-start;}
  .p-ex .info{flex:1; min-width:0;}
  .p-ex .n{font-weight:800; font-size:14.5px;} .p-ex .n .ss{font-size:10px; color:var(--blue); background:var(--blue-t); border-radius:5px; padding:1px 5px; margin-right:5px;}
  .p-ex .m{color:var(--muted); font-size:12px; margin-top:4px; line-height:1.5;}
  .p-ex .m b{color:var(--sub); font-weight:700;}

  /* stretch */
  .s-day{margin:22px 2px 6px; font-size:17px; font-weight:800; letter-spacing:-.02em;}
  .s-lab{font-size:13px; font-weight:800; margin:14px 2px 9px; display:flex; align-items:center; gap:7px;}
  .s-lab .d{width:7px; height:7px; border-radius:50%;}
  .s-lab .cnt{margin-left:auto; font-size:11px; color:var(--muted); font-weight:700;}
  .poses{display:flex; gap:12px; overflow-x:auto; padding:2px 2px 10px; margin:0 -2px; scrollbar-width:none; scroll-snap-type:x mandatory;}
  .poses::-webkit-scrollbar{display:none;}
  .pose{flex:0 0 auto; width:162px; background:var(--card); border-radius:18px; box-shadow:var(--sh); overflow:hidden; scroll-snap-align:start;}
  .pose .fig{display:block; width:100%; height:188px;}
  .pose img.fig{object-fit:cover; object-position:center 22%; background:#EDEFF2;}
  .pfig img.fig{width:100%; height:100%; object-fit:cover; object-position:center 18%;}
  .pose .pbody{padding:11px 13px 13px;}
  .pose .pn{font-size:14.5px; font-weight:800; line-height:1.25; letter-spacing:-.02em; display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .pose .key{font-size:10px; font-weight:800; color:#fff; background:var(--blue); border-radius:6px; padding:2px 6px; letter-spacing:0;}
  .pose .key.post{background:var(--up);}
  .pose .pd{font-size:12px; color:var(--muted); margin-top:5px;}
  .s-pt{background:var(--yellow); border-radius:12px; padding:11px 13px; font-size:12.5px; color:#8a6d1a; margin-top:12px; line-height:1.5;}
  .s-lab .play{margin-left:auto; border:0; background:var(--blue); color:#fff; font-size:11.5px; font-weight:800; border-radius:9px; padding:6px 11px; cursor:pointer;}
  .s-lab .play.post{background:var(--up);}
  .pose{cursor:pointer;}
  .pose .pdetail{font-size:10.5px; color:var(--blue); font-weight:700; margin-top:5px;}
  /* guided timer player */
  .player{position:fixed; inset:0; z-index:60; background:var(--bg); display:none; flex-direction:column;}
  .player.on{display:flex;}
  .phead{display:flex; align-items:center; gap:12px; padding:calc(14px + env(safe-area-inset-top)) 16px 8px;}
  .phead .px{flex:0 0 auto; width:36px; height:36px; border-radius:50%; background:var(--card); border:0; box-shadow:var(--sh); font-size:16px; color:var(--sub); cursor:pointer;}
  .pprog{flex:1; height:6px; background:var(--line); border-radius:4px; overflow:hidden;}
  .pprog i{display:block; height:100%; border-radius:4px; transition:width .3s;}
  .pcount{flex:0 0 auto; font-size:13px; font-weight:800; color:var(--sub); font-variant-numeric:tabular-nums;}
  .pstage{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 24px; gap:9px; overflow-y:auto;}
  .pfig{width:200px; height:200px; border-radius:24px; overflow:hidden; box-shadow:var(--sh);}
  .pfig .fig{width:100%; height:100%; display:block;}
  @keyframes fbreathe{0%,100%{transform:scale(1)} 50%{transform:scale(1.03)}}
  .pfig.breathe{animation:fbreathe 3.2s ease-in-out infinite;}
  @media (prefers-reduced-motion:reduce){.pfig.breathe{animation:none;}}
  .pname{font-size:23px; font-weight:800; letter-spacing:-.02em; margin-top:4px;}
  .ptar{font-size:12px; font-weight:800; border-radius:8px; padding:4px 10px;}
  .pcue{font-size:14px; color:var(--sub); line-height:1.55; max-width:300px;}
  .pring{position:relative; width:132px; height:132px; margin-top:4px;}
  .pring svg{transform:rotate(-90deg);}
  .pring .ringfg{transition:stroke-dashoffset .12s linear;}
  .pnum{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
  .pnum .pbig{font-size:38px; font-weight:800; font-variant-numeric:tabular-nums; line-height:1;}
  .pnum .psub{font-size:12px; color:var(--muted); font-weight:700; margin-top:3px;}
  .pctrl{display:flex; align-items:center; justify-content:center; gap:16px; padding:16px 0 calc(22px + env(safe-area-inset-bottom));}
  .pctrl button{border:0; background:var(--card); box-shadow:var(--sh); border-radius:50%; cursor:pointer; color:var(--ink); display:flex; align-items:center; justify-content:center;}
  .pctrl .sm{width:52px; height:52px; font-size:17px;}
  .pctrl .big{width:66px; height:66px; font-size:22px; background:var(--blue); color:#fff; box-shadow:0 6px 16px rgba(49,130,246,.35);}
  .pdone .em{font-size:52px; margin-bottom:6px;}

  /* HRV 측정 오버레이 + 컨디션 카드 */
  .hrvov{position:fixed;inset:0;z-index:70;background:var(--bg);display:none;flex-direction:column;}
  .hrvov.on{display:flex;}
  .hv-head{display:flex;align-items:center;gap:12px;padding:calc(14px + env(safe-area-inset-top)) 16px 8px;}
  .hv-head .hx{width:36px;height:36px;border-radius:50%;background:var(--card);border:0;box-shadow:var(--sh);font-size:16px;color:var(--sub);cursor:pointer;}
  .hv-head .ht{font-size:16px;font-weight:800;}
  .hv-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 22px;gap:12px;overflow-y:auto;}
  .hv-wave{width:100%;max-width:340px;height:96px;border-radius:12px;background:#0E1420;}
  .hv-ring{width:150px;height:150px;position:relative;}
  .hv-ring svg{transform:rotate(-90deg);}
  .hv-ring .t{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .hv-ring .n{font-size:34px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1;}
  .hv-ring .u{font-size:11px;color:var(--muted);font-weight:700;margin-top:3px;}
  .hv-q{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--muted);}
  .hv-qd{width:9px;height:9px;border-radius:50%;background:var(--muted);}
  .hv-qd.good{background:var(--up);}.hv-qd.mid{background:#F2C94C;}.hv-qd.bad{background:var(--down);}
  .hv-steps{font-size:13px;color:var(--sub);line-height:1.65;max-width:320px;}
  .hv-steps b{color:var(--ink);}
  .hv-cta{padding:14px 16px calc(20px + env(safe-area-inset-bottom));}
  .hv-cta button{width:100%;border:0;background:var(--blue);color:#fff;font-size:16px;font-weight:800;border-radius:15px;padding:16px;box-shadow:0 6px 16px rgba(49,130,246,.32);cursor:pointer;}
  .hv-cta button.stop{background:var(--down);box-shadow:none;}
  .cond-row{display:flex;gap:8px;margin-top:10px;}
  .cond-row button{flex:1;border:1.5px solid var(--line);background:var(--card);color:var(--sub);border-radius:12px;padding:11px 0;font-weight:800;font-size:14px;cursor:pointer;}
  .cond-row button.good.on{border-color:var(--up);background:#E4F8F0;color:#0E7A55;}
  .cond-row button.bad.on{border-color:var(--down);background:#FDECEE;color:#B4232E;}
  .cond-stat{display:flex;align-items:center;gap:10px;background:var(--card2);border-radius:13px;padding:12px 14px;margin-top:12px;}
  .cond-stat .cv{font-size:23px;font-weight:800;font-variant-numeric:tabular-nums;}
  .cond-stat .cl{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:1px;}
  .cond-prog{height:7px;background:var(--line);border-radius:5px;overflow:hidden;margin-top:12px;}
  .cond-prog i{display:block;height:100%;background:var(--blue);border-radius:5px;}
  .rec-banner{border-radius:13px;padding:13px 15px;margin-top:12px;font-size:13.5px;line-height:1.55;}
  .rec-banner b{font-weight:800;}
  .rec-low{background:#FDECEE;color:#B4232E;}.rec-soft{background:var(--yellow);color:#8a6d1a;}.rec-norm{background:var(--blue-t);color:var(--blue-d);}.rec-go{background:#E4F8F0;color:#0E7A55;}

  /* 스트레칭 사진 확대 라이트박스 */
  .lightbox{position:fixed; inset:0; z-index:80; background:rgba(10,12,16,.95); display:none; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px 16px calc(24px + env(safe-area-inset-bottom));}
  .lightbox.on{display:flex;}
  .lb-media{width:100%; max-width:560px; flex:1; min-height:0; display:flex; align-items:center; justify-content:center;}
  .lb-media img.fig{width:auto; height:auto; max-width:100%; max-height:100%; border-radius:16px; object-fit:contain; display:block;}
  .lb-media svg.fig{width:min(84vw,340px); height:min(84vw,340px); background:#EDEFF2; border-radius:16px;}
  .lb-cap{text-align:center; color:#fff; flex:0 0 auto;}

function migrate(o){ var R={"d3|시티드 카프레이즈":"d3|스탠딩 카프레이즈"}; var moved=false;
  for(var k in R){ var nk=R[k];
    if(o.logs[k]){ if(!o.logs[nk]) o.logs[nk]=o.logs[k]; else o.logs[nk]=o.logs[nk].concat(o.logs[k]); delete o.logs[k]; moved=true; }
    if(o.memos[k]&&!o.memos[nk]){ o.memos[nk]=o.memos[k]; delete o.memos[k]; }
  }
  if(moved){ try{ localStorage.setItem(KEY,JSON.stringify(o)); }catch(e){} }
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} }
function keyFor(id,n){ return id+"|"+n; }

function todayStr(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseD(s){ var a=s.split("-"); return new Date(+a[0],+a[1]-1,+a[2],12,0,0); }
function weekIdx(s){ var d=parseD(s); var day=(d.getDay()+6)%7; var mon=new Date(d); mon.setDate(d.getDate()-day); return Math.round(mon.getTime()/6.048e8); }
var CUR_WEEK=weekIdx(todayStr());
if(DB.startWeek==null){ DB.startWeek=CUR_WEEK; save(); }
function pgClone(o){ return JSON.parse(JSON.stringify(o)); }
var PROGRAM = (DB.program && DB.program.length) ? DB.program : DEFAULT_PROGRAM;
function useProgram(arr){ DB.program=arr; PROGRAM=arr; if(!PROGRAM.some(function(d){return d.id===DB.day;})) DB.day=PROGRAM[0]?PROGRAM[0].id:"d1"; save(); }

function e1rm(w,r){ return w>0&&r>0? w*(1+r/30):0; }
function round25(x){ return Math.round(x/2.5)*2.5; }
function fmt(n){ return (Math.round(n*10)/10).toString().replace(/\.0$/,""); }
function parseSets(w){ var m=/^(\d+)×(\d+)(?:-(\d+))?/.exec(w); if(!m) return {sets:3,lo:8,hi:12}; return {sets:+m[1],lo:+m[2],hi:m[3]?+m[3]:+m[2]}; }

function sessions(k){ return DB.logs[k]||[]; }
function sessionOn(k,date){ var a=sessions(k); for(var i=0;i<a.length;i++) if(a[i].date===date) return a[i]; return null; }
function bestE1(sess){ if(!sess||!sess.sets) return 0; var b=0; sess.sets.forEach(function(s){ b=Math.max(b,e1rm(s.w,s.r)); }); return b; }
function weekBestE1(k,wi){ var b=0; sessions(k).forEach(function(s){ if(weekIdx(s.date)===wi) b=Math.max(b,bestE1(s)); }); return b; }
function lastSessionBefore(k,date){ var a=sessions(k),r=null; a.forEach(function(s){ if(s.date<date) r=s; }); return r; }

/* ============ TODAY ============ */
function progPct(){
  // sessions logged this week / total training exercises
  var total=0,done=0;
  PROGRAM.forEach(function(d){ if(d.rest) return; d.ex.forEach(function(ex){ total++; var s=sessionOn(keyFor(d.id,ex.n),todayStr()); }); });
  // weekly completion: count exercises with any done set this week
  var wk=DB.week||0; PROGRAM.forEach(function(d){ if(d.rest) return; d.ex.forEach(function(ex){
    var any=sessions(keyFor(d.id,ex.n)).some(function(s){ return weekIdx(s.date)===CUR_WEEK && s.sets.some(function(x){return x.done;}); }); if(any) done++;
  }); });
  return total? Math.round(done/total*100):0;
}
var UPBP={"가슴":1,"등":1,"어깨":1,"팔":1};
function dayStretchType(d){ if(d.stype && STRETCH_SETS[d.stype]) return d.stype;
  var u=0,l=0; (d.ex||[]).forEach(function(e){ if(UPBP[e.bp]) u++; else if(e.bp==="하체"||e.bp==="카프") l++; });
  if(u>0 && l>0 && Math.min(u,l)>=2) return "전신";
  return u>=l?"상체":"하체"; }
function stretchFor(d){ return STRETCH_SETS[dayStretchType(d)]; }
var PENDING={}, collapseIv=null;
function ensureCollapseIv(){ if(collapseIv) return; collapseIv=setInterval(function(){
  var any=false, changed=false;
  for(var kt in PENDING){ any=true; PENDING[kt]--;
    if(PENDING[kt]<=0){ DB.collapsed[kt]=1; delete PENDING[kt]; changed=true; }
    else { var el=document.querySelector('.donepop .cd[data-kt="'+kt+'"]'); if(el) el.textContent=PENDING[kt]; }
  }
  if(!any){ clearInterval(collapseIv); collapseIv=null; }
  if(changed){ save(); renderDayBody(); }
},1000); }
function clearPending(){ PENDING={}; if(collapseIv){ clearInterval(collapseIv); collapseIv=null; } }
function dayMinutes(d){ var m=(d.walk||0)+5; d.ex.forEach(function(e){ m+=e.t||0; }); m+=5; m+=(d.liss||5); return m; }
function renderToday(){
  var host=document.getElementById("v-today"); host.innerHTML="";
  var wkNo=CUR_WEEK-DB.startWeek+1; if(wkNo<1) wkNo=1;
  var pct=progPct();
  var prog='<div class="prog"><div class="pname">윤수영 린매스업</div><div class="pweek">'+wkNo+'주차 · 목표 근육량 40kg · 체지방 10% · 이번 주 '+pct+'% 완료</div>'+
    '<div class="bar"><i style="width:'+pct+'%"></i></div><div class="pmeta"><span>강도 &gt; 볼륨 · 자세 우선</span></div></div>';
  var chips='<div class="days">'+PROGRAM.map(function(d){
    var doneToday=false; if(!d.rest){ doneToday=d.ex.every(function(ex){ var s=sessionOn(keyFor(d.id,ex.n),todayStr()); return s&&s.sets.some(function(x){return x.done;}); }); }
    var ic=d.rest? '<path d="M20 13a8 8 0 1 1-9-9 6 6 0 0 0 9 9z"/>' : (doneToday?'<path d="M5 12l5 5L20 6"/>':'<path d="M6 8v8M18 8v8M4 10h2M18 10h2M8 12h8"/>');
    return '<button class="dchip'+(d.id===DB.day?" on":"")+(doneToday?" done":"")+'" data-day="'+d.id+'"><div class="ic"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">'+ic+'</svg></div><div class="dl">'+(d.rest?"휴식":d.day.replace("DAY ","Day "))+'</div></button>';
  }).join("")+'</div>';
  host.innerHTML=prog+chips+'<div id="dayBody"></div>';
  host.querySelectorAll(".dchip").forEach(function(b){ b.onclick=function(){ DB.day=b.getAttribute("data-day"); clearPending(); save(); renderToday(); }; });
  renderDayBody();
}
function flowBlock(d,id,glyph,title,detail,min,accent){
  var bk=todayStr()+"|"+d.id+"|"+id, done=!!DB.blocks[bk];
  var el=document.createElement("div"); el.className="flow"+(done?" done":"");
  el.innerHTML='<div class="fic" style="background:'+(done?"var(--up)":accent)+'22;color:'+(done?"var(--up)":accent)+'">'+glyph+'</div>'+
    '<div class="fmid"><div class="ft">'+title+' <span class="fmin">'+min+'분</span></div><div class="fd">'+detail+'</div></div>'+
    '<button class="chk"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></button>';
  el.querySelector(".chk").onclick=function(){ if(DB.blocks[bk]) delete DB.blocks[bk]; else { DB.blocks[bk]=1; celebrateAt(this,1); } save(); renderDayBody(); };
  return el;
}
function renderDayBody(){
  var d=PROGRAM.filter(function(x){return x.id===DB.day;})[0];
  var host=document.getElementById("dayBody"); host.innerHTML="";
  var head=document.createElement("div"); head.className="dayhead";
  head.innerHTML='<h2>'+d.day+'</h2><div class="focus">'+d.focus+(d.rest?'':' · 예상 ~'+dayMinutes(d)+'분')+'</div>'; host.appendChild(head);
  if(d.rest){
    var rc=document.createElement("div"); rc.className="rest-card";
    rc.innerHTML='<div class="em"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 13a8 8 0 1 1-9-9 6 6 0 0 0 9 9z"/></svg></div><h3>회복하는 날이에요</h3><p>'+d.cardio+'<br>가볍게 걷고 푹 쉬세요 💙</p>'; host.appendChild(rc); return;
  }
  var st=stretchFor(d);
  // 1) 웜업 걷기  2) 동적 스트레칭
  host.appendChild(flowBlock(d,"walk1","🚶","유산소","경사 2% · 5.5km/h",d.walk||8,"#3182F6"));
  if(st) host.appendChild(flowBlock(d,"str1","🤸","운동 전 · 동적 스트레칭",st.pre.map(function(m){return m[0];}).join(" · ")+" — 스트레칭 탭에 그림",5,"#3182F6"));
  // 3) 운동
  var UPPER={"가슴":1,"어깨":1,"팔":1,"등":1}, transDone=false, prevBp=null;
  d.ex.forEach(function(ex,i){
    if(!transDone && prevBp==="하체" && UPPER[ex.bp]){ host.appendChild(flowBlock(d,"trans","🤸","상체 전환 스트레칭 · 숨 고르기","크로스바디 숄더 · 문틀 가슴 · 팔 흔들기 — 호흡 정리 + 상체 관절 깨우기",3,"#3182F6")); transDone=true; }
    host.appendChild(exCard(d,ex,i===0)); prevBp=ex.bp;
  });
  // 4) 정적 스트레칭  5) 마무리 걷기
  if(st) host.appendChild(flowBlock(d,"str2","🧘","부상방지 스트레칭",st.post.map(function(m){return m[0];}).join(" · ")+" — 30초씩",5,"#12B886"));
  host.appendChild(flowBlock(d,"walk2","🚶","쿨다운",d.liss?"경사 10% · 5.0km/h":"경사 0% · 4.5km/h",d.liss||5,"#12B886"));
  var cta=document.createElement("div"); cta.className="cta";
  var allDone=d.ex.every(function(ex){ var s=sessionOn(keyFor(d.id,ex.n),todayStr()); return s&&s.sets.every(function(x){return x.done;}); });
  cta.innerHTML='<button class="'+(allDone?"done":"")+'">'+(allDone?"오늘 운동 완료! 💪":d.day+" 진행 중")+'</button>'; host.appendChild(cta);
}
function warmRows(ex,baseW,isFirst){
  if(ex.bp==="복근") return '';
  var out='';
  var rows=[];
  if(isFirst) rows.push(['활성화','최소무게',30]);
  else if(ex.wact) rows.push(['활성화','가벼운 무게',ex.wact]);
  if(SCHEME[ex.s]){ SCHEME[ex.s].forEach(function(p){ rows.push(['W', baseW>0?fmt(round25(baseW*p[0]))+'kg':(p[0]*100)+'%', p[1]]); }); }
  if(!rows.length) return '';
  return '<div class="warmbox"><div class="wlab">웜업 세트</div>'+rows.map(function(r,i){
    return '<div class="wrow"><span class="wn">'+(r[0]==='활성화'?'⚡':'W'+i)+'</span><span class="ww">'+r[1]+'</span><span class="wr">×'+r[2]+(r[0]==='활성화'?'회 (가볍게 풀기)':'회')+'</span></div>';
  }).join('')+'</div>';
}
function exCard(d,ex,isFirst){
  var k=keyFor(d.id,ex.n), t=todayStr(), ps=parseSets(ex.w);
  var sess=sessionOn(k,t); if(!sess){ sess={date:t,sets:[]}; }
  var prev=lastSessionBefore(k,t);
  var kt=k+"|"+t;
  var doneN=sess.sets.filter(function(x){return x.done;}).length;
  var boN=ex.bo?1:0;
  var dropN=(ex.tech&&ex.tech.indexOf("드롭")>=0)?((ex.tech.indexOf("트리플")>=0)?3:1):0;
  var carryAdd=(DB.carry[k] && DB.carry[k].from < t)?DB.carry[k].n:0;
  var want=Math.max(1, ps.sets+boN+dropN+carryAdd+(DB.extra[kt]||0), doneN);
  while(sess.sets.length<want){ var i=sess.sets.length; var pv=prev&&prev.sets[i]; sess.sets.push({w:pv?pv.w:0,r:pv?pv.r:ps.lo,done:false}); }
  while(sess.sets.length>want){ sess.sets.pop(); }
  var allDone=sess.sets.length>0 && sess.sets.every(function(x){return x.done;});
  var card=document.createElement("div"); card.className="card";
  // 스킵됨 (다음 주기로 미룸)
  if(DB.skipped[kt]){
    card.className="card collapsed skipped";
    card.innerHTML='<div class="cbar"><span class="cchk" style="background:var(--muted)">↷</span><b>'+ex.n+'</b><span class="csum">스킵 · 다음 주기로</span><span class="cexp">되돌리기</span></div>';
    card.querySelector(".cbar").onclick=function(){ delete DB.skipped[kt]; save(); renderDayBody(); };
    return card;
  }
  // collapsed view (완료 후 접기)
  if(allDone && DB.collapsed[kt] && PENDING[kt]==null){
    var bt=bestTop(sess);
    card.className="card collapsed";
    card.innerHTML='<div class="cbar"><span class="cchk">✓</span><b>'+ex.n+'</b><span class="csum">'+fmt(bt.w)+'kg × '+bt.r+' 완료</span><span class="cexp">펼치기 ▾</span></div>';
    card.querySelector(".cbar").onclick=function(){ delete DB.collapsed[kt]; save(); renderDayBody(); };
    return card;
  }
  var thisB=weekBestE1(k,CUR_WEEK), lastB=weekBestE1(k,CUR_WEEK-1);
  var wow='';
  if(lastB>0){ var diff=thisB-lastB; if(thisB!==0){ var c=diff>0.5?"up":(diff<-0.5?"down":"flat"); var ar=diff>0.5?"▲":(diff<-0.5?"▼":"–"); wow='<div class="wow '+c+'">'+ar+' '+fmt(Math.abs(diff))+'</div>'; } }
  else if(thisB>0){ wow='<div class="wow flat">이번주</div>'; }
  var lastTxt = prev? '지난 '+fmt(bestTop(prev).w)+'kg·'+bestTop(prev).r+'회' : '첫 기록';
  card.innerHTML='<div class="exhead"><div class="exmeta"><div class="exname">'+(ex.ss?'<span class="ss">슈퍼 '+ex.ss+'</span>':'')+ex.n+'</div>'+
    '<div class="exsub">'+ex.w.replace("×","세트 ")+'회 · 휴식 '+ex.rest+' · ⏱~'+ex.t+'분 · <span class="last">'+lastTxt+'</span></div></div>'+
    '<div class="badge">'+wow+'</div></div>';
  // 안전/메인 배너
  if(ex.risky){ var sb=document.createElement("div"); sb.className="banner danger";
    sb.innerHTML='⚠️ <b>무게 욕심 버려.</b> 자세·호흡·근육인지.<br><span class="prime">선행: 브레이싱 → 힙힌지 5회 → 맥길빅3(버드독·데드버그·사이드플랭크 10초씩)</span>';
    card.appendChild(sb); }
  else if(ex.tech && ex.tech.indexOf("프리웨이트")>=0){ var fw=document.createElement("div"); fw.className="banner free";
    fw.innerHTML='🟠 <b>프리웨이트 — 자세 우선.</b> 1개 남기고(RIR 1), 통증 없는 범위.'; card.appendChild(fw); }
  else if(ex.main){ var mn=document.createElement("div"); mn.className="banner ok";
    mn.innerHTML='🔥 <b>안전한 머신 — 마지막 세트 실패지점까지</b>'; card.appendChild(mn); }
  else if(ex.maint){ var mt=document.createElement("div"); mt.className="banner maint";
    mt.innerHTML='🟦 <b>유지.</b> RIR 1-2, 무게만 지켜.'; card.appendChild(mt); }
  // recommendation
  var baseE=0; sessions(k).forEach(function(s){ baseE=Math.max(baseE,bestE1(s)); });
  var topW=0; sess.sets.forEach(function(s,ix){ if(ix<ps.sets&&s.w>topW) topW=s.w; }); if(topW===0&&prev) topW=bestTop(prev).w;
  var recWrap=document.createElement("div");
  if(ex.fixed){
    recWrap.innerHTML='<div class="recohint" style="margin-top:12px">🔒 무게 고정 종목 — 렙수로 판단 (무게 증량 X)</div>';
  } else if(SCHEME[ex.s]!==undefined && baseE>0){
    var tr=ps.lo, base=baseE/(1+tr/30);
    recWrap.innerHTML='<div class="recos">'+recoEl("쉬움",round25(base*0.95),tr,"")+recoEl("적정",round25(base),tr,"mid")+recoEl("도전",round25(base*1.03),tr,"")+
      '</div><div class="recohint">'+tr+'회 기준 추천. 탭=채움.</div>';
  } else recWrap.innerHTML='<div class="recohint" style="margin-top:12px">첫 세트 넣으면 다음부턴 무게 추천.</div>';
  if(ex.bp==="복근") recWrap.innerHTML='<div class="recohint" style="margin-top:12px">복근 — 무게 없이 횟수만 (정자세 실패까지)</div>';
  card.appendChild(recWrap);
  recWrap.querySelectorAll(".reco").forEach(function(r){ r.onclick=function(){ var w=+r.getAttribute("data-w"),rp=+r.getAttribute("data-r"); sess.sets.forEach(function(s,ix){ if(!s.done&&ix<ps.sets){ s.w=w; s.r=rp; } }); persist(k,sess); renderDayBody(); }; });
  // 웜업 세트
  var wm=document.createElement("div"); wm.innerHTML=warmRows(ex,topW,isFirst); if(wm.firstChild) card.appendChild(wm.firstChild);
  // 워킹 세트 (+백오프)
  var setWrap=document.createElement("div"); setWrap.className="worklab-wrap";
  var wl=document.createElement("div"); wl.className="wlab"; wl.textContent="워킹 세트 · ← 밀면 삭제"; setWrap.appendChild(wl);
  var bw=(ex.bp==="복근");
  sess.sets.forEach(function(stt,idx){
    var typ = idx<ps.sets ? "work" : (idx<ps.sets+boN ? "bo" : (idx<ps.sets+boN+dropN ? "ds" : (idx<ps.sets+boN+dropN+carryAdd ? "carry" : "extra")));
    var row=document.createElement("div"); row.className="setrow"+(stt.done?" done":"")+(typ==="bo"?" bo":"")+(typ==="ds"?" ds":"")+(typ==="carry"?" carry":"");
    if(typ==="bo" && !stt.w && topW) stt.w=round25(topW*0.5);
    if(typ==="ds" && !stt.w && topW) stt.w=round25(topW*0.7);
    var lbl=typ==="bo"?"BO":(typ==="ds"?"DS":(typ==="carry"?"↩":(typ==="extra"?"＋":(idx+1))));
    row.innerHTML='<div class="snum">'+lbl+'</div>'+
      (bw?'':stp("w",stt.w,2.5)+'<span class="unit">kg</span>')+
      stp("r",stt.r,1)+'<span class="unit">회</span>'+
      '<button class="chk"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></button>';
    var wI=row.querySelector('[data-f="w"]'), rI=row.querySelector('[data-f="r"]');
    if(wI) wI.addEventListener("input",function(){ stt.w=parseFloat(wI.value)||0; delete PENDING[kt]; persist(k,sess); });
    rI.addEventListener("input",function(){ stt.r=parseInt(rI.value)||0; delete PENDING[kt]; persist(k,sess); });
    row.querySelector(".chk").onclick=function(){ stt.done=!stt.done; if(stt.done&&((!bw&&!stt.w)||!stt.r)){ toast(bw?"횟수를 먼저 입력하세요":"무게·횟수를 먼저 입력하세요"); stt.done=false; return; } persist(k,sess);
      var nowAll=sess.sets.length>0 && sess.sets.every(function(x){return x.done;});
      if(!nowAll){ delete PENDING[kt]; delete DB.collapsed[kt]; }
      else if(!DB.collapsed[kt] && PENDING[kt]==null){ PENDING[kt]=5; ensureCollapseIv(); }
      if(nowAll && DB.carry[k] && DB.carry[k].from<t){ delete DB.carry[k]; save(); }
      if(stt.done){ toast(bw?(stt.r+"회 기록 ✓"):("e1RM "+fmt(e1rm(stt.w,stt.r))+"kg")); celebrateAt(this, nowAll?2:1); if(nowAll) checkWorkoutDone(); }
      renderDayBody(); };
    (function(rowEl,i){ var x0,y0,drag=false,dx=0;
      rowEl.addEventListener("pointerdown",function(e){ if(e.target.closest("input,button")) return; x0=e.clientX; y0=e.clientY; drag=true; dx=0; rowEl.style.transition="none"; });
      rowEl.addEventListener("pointermove",function(e){ if(!drag) return; var a=e.clientX-x0,b=e.clientY-y0; if(Math.abs(b)>Math.abs(a)&&Math.abs(b)>8){ drag=false; rowEl.style.transform=""; rowEl.style.opacity=""; return; } if(a<0){ dx=Math.max(a,-110); rowEl.style.transform="translateX("+dx+"px)"; rowEl.style.opacity=String(Math.max(0.3,1+dx/160)); } });
      rowEl.addEventListener("pointerup",function(){ if(!drag) return; drag=false; rowEl.style.transition=".18s"; if(dx<-70){ rowEl.style.transform="translateX(-110%)"; rowEl.style.opacity="0"; setTimeout(function(){ sess.sets.splice(i,1); DB.extra[kt]=(DB.extra[kt]||0)-1; persist(k,sess); toast("세트 삭제"); renderDayBody(); },140); } else { rowEl.style.transform=""; rowEl.style.opacity=""; } });
      rowEl.addEventListener("pointercancel",function(){ if(!drag) return; drag=false; rowEl.style.transition=".18s"; rowEl.style.transform=""; rowEl.style.opacity=""; });

function renderStats(){

  var vc='<div class="stat-card"><div class="cap">이번 주 총 볼륨</div><div class="big num">'+fmt(Math.round(tv))+'<small> kg</small></div><div class="wowline">'+wowTxt+'</div>';
  // weekday chart (stacked by bp)
  var byDay={}; for(var i=0;i<7;i++) byDay[i]={};
  thisW.forEach(function(x){ var wd=(parseD(x.s.date).getDay()+6)%7; byDay[wd][x.ex.bp]=(byDay[wd][x.ex.bp]||0)+volOf(x.s); });
  var maxDay=1; for(var j=0;j<7;j++){ var sum=0; for(var b in byDay[j]) sum+=byDay[j][b]; maxDay=Math.max(maxDay,sum); }
  var names=["월","화","수","목","금","토","일"]; var todayWd=(new Date().getDay()+6)%7;
  var chart='<div class="chart">'+names.map(function(nm,idx){

  }).join("")+'</div></div>';
  host.innerHTML=vc+chart;
  // body part balance
  var bpv={}; thisW.forEach(function(x){ bpv[x.ex.bp]=(bpv[x.ex.bp]||0)+volOf(x.s); });
  var maxbp=1; BPS.forEach(function(b){ maxbp=Math.max(maxbp,bpv[b]||0); });
  var bc=document.createElement("div"); bc.className="stat-card";
  bc.innerHTML='<div class="cap">부위별 볼륨 밸런스</div><div class="bpbars">'+BPS.map(function(bp){
    var v=bpv[bp]||0; return '<div class="bpbar"><div class="nm">'+bp+'</div><div class="track"><div class="fill" style="width:'+(v/maxbp*100)+'%;background:'+BPC[bp]+'"></div></div><div class="vv num">'+fmt(Math.round(v))+'kg</div></div>';
  }).join("")+'</div>'; host.appendChild(bc);
  // 1RM growth per exercise (>=2 weeks)
  var growth=[];
  PROGRAM.forEach(function(d){ if(d.rest) return; d.ex.forEach(function(ex){
    var k=keyFor(d.id,ex.n); var byW={}; sessions(k).forEach(function(s){ var wi=weekIdx(s.date); byW[wi]=Math.max(byW[wi]||0,bestE1(s)); });
    var wks=Object.keys(byW).map(Number).sort(function(a,b){return a-b;}); if(wks.length<2) return;
    var series=wks.map(function(w){return byW[w];}); var first=series[0],last=series[series.length-1];
    growth.push({n:ex.n,bp:ex.bp,series:series,pct:first>0?Math.round((last-first)/first*100):0,last:last});

  var gc=document.createElement("div"); gc.className="stat-card";
  if(growth.length===0){ gc.innerHTML='<div class="cap">1RM 성장 추이</div><div class="empty" style="padding:18px">2주 이상 기록하면<br>종목별 성장 그래프가 나와요</div>'; }
  else { growth.sort(function(a,b){return b.pct-a.pct;});
    gc.innerHTML='<div class="cap">1RM 성장 추이</div>'+growth.map(function(g){
      return '<div class="spark"><div style="min-width:0"><div class="sn">'+g.n+'</div><div class="ssub">최고 '+fmt(g.last)+'kg</div></div>'+sparkline(g.series,g.pct)+'<div class="grow" style="color:'+(g.pct>=0?"var(--up)":"var(--down)")+'">'+(g.pct>=0?"+":"")+g.pct+'%</div></div>';

function sparkline(series,pct){
  var w=72,h=30,pad=3,n=series.length,mn=Math.min.apply(null,series),mx=Math.max.apply(null,series),rng=(mx-mn)||1;
  var pts=series.map(function(v,i){ var x=pad+i/(n-1)*(w-2*pad); var y=h-pad-(v-mn)/rng*(h-2*pad); return x+","+y; });
  var col=pct>=0?"#12B886":"#F04452";
  var last=pts[pts.length-1].split(",");
  return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><polyline points="'+pts.join(" ")+'" fill="none" stroke="'+col+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="'+last[0]+'" cy="'+last[1]+'" r="2.8" fill="'+col+'"/></svg>';
}

  if(base.torsoMid)s.torsoMid=base.torsoMid.slice(); s.head=base.head.slice(); if(base.glow)s.glow=base.glow.slice();
  for(var k in edits){ if(k==='torsoMid')s.torsoMid=edits[k]; else if(k==='head')s.head=edits[k]; else if(k==='torso')s.torso=edits[k]; else if(k==='glow')s.glow=edits[k]; else if(k==='front')s.front=edits[k]; else s.limbs[+k]=edits[k]; }
  return s; }
function lerpArr(a,b,p){ return a.map(function(v,i){ return (typeof v==='number'&&typeof b[i]==='number')? v+(b[i]-v)*p : v; }); }
function lerpLimb(la,lb,p){ var x1=la[0]+(lb[0]-la[0])*p, y1=la[1]+(lb[1]-la[1])*p, x2=la[2]+(lb[2]-la[2])*p, y2=la[3]+(lb[3]-la[3])*p;
  var lA=Math.hypot(la[2]-la[0],la[3]-la[1]), lB=Math.hypot(lb[2]-lb[0],lb[3]-lb[1]), L=lA+(lB-lA)*p;
  var dx=x2-x1, dy=y2-y1, d=Math.hypot(dx,dy)||0.001; return [x1,y1,x1+dx/d*L,y1+dy/d*L,la[4]]; }
function lerpSpec(A,B,p){ var s={}; for(var k in A)s[k]=A[k];
  s.torso=lerpArr(A.torso,B.torso,p); if(A.torsoMid&&B.torsoMid)s.torsoMid=lerpArr(A.torsoMid,B.torsoMid,p);
  s.head=lerpArr(A.head,B.head,p); if(A.glow&&B.glow)s.glow=lerpArr(A.glow,B.glow,p);
  s.limbs=A.limbs.map(function(l,i){ return lerpLimb(l,B.limbs[i]||l,p); });
  if(A.back2&&B.back2) s.back2=A.back2.map(function(l,i){ return lerpLimb(l,B.back2[i]||l,p); });

/* ============ HRV (심박변이 컨디션) ============ */
var HV_TARGET=25, HV_MIN=15, HV_SETTLE=2.5, HV_MAX=180, HV=null;
function hvAvg(a){ var s=0; a.forEach(function(x){s+=x;}); return a.length?s/a.length:0; }
function hvMedian(a){ var s=a.slice().sort(function(x,y){return x-y;}); var n=s.length; return n?(n%2?s[(n-1)/2]:(s[n/2-1]+s[n/2])/2):0; }
function hrvGetToday(){ var t=todayStr(); for(var i=0;i<DB.hrv.length;i++) if(DB.hrv[i].date===t) return DB.hrv[i]; return null; }
function hrvSaveToday(rmssd,bpm){ var t=todayStr(), ex=hrvGetToday(); if(ex){ ex.rmssd=rmssd; ex.bpm=bpm; } else { DB.hrv.push({date:t,rmssd:rmssd,bpm:bpm}); } DB.hrv.sort(function(a,b){return a.date<b.date?-1:1;}); save(); }
function hrvBaseline(){ var t=todayStr(); var prior=DB.hrv.filter(function(x){return x.date<t;}).slice(-14);
  var vals=prior.map(function(x){return x.rmssd;}); var mean=hvAvg(vals);
  var sd=vals.length?Math.sqrt(hvAvg(vals.map(function(v){return (v-mean)*(v-mean);}))):0;
  return {count:prior.length, mean:mean, sd:sd, ready:prior.length>=7}; }
function hrvLevel(today){ var b=hrvBaseline(); if(!b.ready||!today) return null;
  if(b.sd>3){ if(today.rmssd<b.mean-0.75*b.sd) return 'low'; if(today.rmssd>b.mean+0.75*b.sd) return 'high'; return 'norm'; }
  var r=today.rmssd/(b.mean||1); if(r<0.85) return 'low'; if(r>1.15) return 'high'; return 'norm'; }
function hrvMood(){ return DB.mood[todayStr()]||null; }
function hrvSetMood(m){ if(hrvMood()===m) delete DB.mood[todayStr()]; else DB.mood[todayStr()]=m; save(); renderMore(); }
function hrvRecommend(level,mood){
  var hv={low:-1,norm:0,high:1}[level]; if(hv===undefined||hv===null) hv=0;
  var mv={bad:-1,good:1}[mood]; if(mv===undefined) mv=0;
  var tot=hv+mv;
  if(tot<=-2) return {cls:'rec-low',t:'<b>오늘은 크게 쉬어가기.</b> 회복 신호가 약해요. 무게 -10~15%, 강도 기법·백오프 빼고 세트도 줄이거나 가벼운 유산소만.'};
  if(tot===-1) return {cls:'rec-soft',t:'<b>살살 가기.</b> 톱세트만 RIR 2 남기고 드롭·레스트포즈 생략. 무게는 유지.'};
  if(tot===0) return {cls:'rec-norm',t:'<b>계획대로.</b> 워밍업 느낌 보고 판단하되 평소대로 진행.'};
  if(tot===1) return {cls:'rec-go',t:'<b>컨디션 좋음.</b> 계획대로 밀어붙여요.'};
  return {cls:'rec-go',t:'<b>최상 컨디션!</b> 계획대로 + 여력되면 톱세트 무게/세트 살짝 도전.'};
}

  var h='<div class="m-card" id="condCard"><h3>오늘 컨디션 (HRV)</h3><div class="sb">심박변이로 회복 상태 체크 · 손가락+카메라</div>';
  if(!b.ready){
    if(have<7){ h+='<div class="cond-prog"><i style="width:'+Math.round(Math.min(1,have/7)*100)+'%"></i></div>'+
      '<div class="sb" style="margin:8px 0 0">베이스라인(내 평균) 수집 중 · <b>'+have+'/7일</b>. 매일 한 번 재면 7일 뒤부터 그날 컨디션을 판단해줘요.</div>'; }

      var r=Math.random(), shape=r<0.5?"rect":(r<0.8?"circ":"strip");
      parts.push({x:ox,y:oy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(dir==null?Math.random()*3:0),rot:Math.random()*6.28,vr:(Math.random()-0.5)*0.55,
        sz:shape==="strip"?(Math.random()*4+3):(Math.random()*7+4),col:cols[(Math.random()*cols.length)|0],shape:shape,life:1,decay:0.005+Math.random()*0.006,t:Math.random()*100,flut:Math.random()*1.6+0.4});
    }
  }
  if(level>=3){ spawn(cx,cy,100,18,null); spawn(6,H,80,27,-Math.PI/2.5); spawn(W-6,H,80,27,-Math.PI+Math.PI/2.5); spawn(cx,cy,50,9,null); }
  else if(level===2){ spawn(cx,cy,85,15,null); spawn(cx,cy,40,7,null); }
  else { spawn(cx,cy,48,12,null); }
  if(navigator.vibrate){ try{ navigator.vibrate(level>=3?[30,40,30,40,30,40,90]:(level===2?[25,35,30]:20)); }catch(e){} }
  function frame(){ ctx.clearRect(0,0,c.width,c.height); var alive=false;
    for(var i=0;i<parts.length;i++){ var p=parts[i]; if(p.life<=0) continue; alive=true;
      p.t++; p.vy+=0.32; p.vx*=0.985; p.x+=p.vx+Math.sin(p.t*0.1)*p.flut; p.y+=p.vy; p.rot+=p.vr; p.life-=p.decay;
      ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(1,p.life*1.4)); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.col;
      if(p.shape==="circ"){ ctx.beginPath(); ctx.arc(0,0,p.sz*0.5,0,6.283); ctx.fill(); }
      else if(p.shape==="strip"){ ctx.fillRect(-p.sz*0.4,-p.sz*1.7,p.sz*0.8,p.sz*3.4); }
      else { ctx.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz*0.62); }
      ctx.restore();
    }
    if(alive) requestAnimationFrame(frame); else ctx.clearRect(0,0,c.width,c.height);
  }
  requestAnimationFrame(frame);
}
function celebrateAt(el,level){ var r=(el&&el.getBoundingClientRect)?el.getBoundingClientRect():null; celebrate(r?r.left+r.width/2:window.innerWidth/2, r?r.top+r.height/2:window.innerHeight/2, level||1); }
function checkWorkoutDone(){ var d=PROGRAM.filter(function(x){return x.id===DB.day;})[0]; if(!d||d.rest) return;
  var all=d.ex.every(function(ex){ var s=sessionOn(keyFor(d.id,ex.n),todayStr()); return s&&s.sets.length>0&&s.sets.every(function(x){return x.done;}); });
  if(all){ setTimeout(function(){ celebrate(window.innerWidth/2, window.innerHeight*0.34, 3); bigToast("오늘 운동 완료! 💪<br>끝까지 해냈어요"); },260); }
}

function renderNav(){ var n=document.getElementById("nav"); n.innerHTML=TABS.map(function(t,i){ return '<button class="'+(i===0?"on":"")+'" data-tab="'+t.id+'"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">'+t.icon+'</svg>'+t.label+'</button>'; }).join("");
  n.querySelectorAll("button").forEach(function(b){ b.onclick=function(){ go(b.getAttribute("data-tab")); }; }); }
function go(id){
  document.querySelectorAll(".view").forEach(function(v){v.classList.remove("on");});
  document.getElementById("v-"+id).classList.add("on");
  document.querySelectorAll("#nav button").forEach(function(b){ b.classList.toggle("on",b.getAttribute("data-tab")===id); });

  if(id==="today")renderToday(); if(id==="stats")renderStats(); if(id==="program")renderProgram(); if(id==="stretch")renderStretch(); if(id==="more")renderMore();

}

function esc(s){ return (s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

renderNav(); document.getElementById("hSub").textContent=SUB.today; renderToday(); maybeWelcome();
